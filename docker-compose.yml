name: robot-agnostic-ai

services:
  ros2-dev:
    build:
      context: .
      dockerfile: docker/ros2-humble/Dockerfile
    image: robot-agnostic-ai:ros2-humble
    container_name: robot_agnostic_ai_ros2_dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    ports:
      - "8010:8010"
    stdin_open: true
    tty: true

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: robot-agnostic-ai:backend
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - ORIMUS_MISSION_CONFIG_DIR=/workspace/configs/missions
      - ORIMUS_LATEST_REPORT_PATH=/workspace/reports/latest_mission_report.json
    ports:
      - "8000:8000"
