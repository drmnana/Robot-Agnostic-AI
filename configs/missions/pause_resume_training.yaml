    target: robot
    command_type: stand
    duration_sec: 1.0

  - name: slow_walk_segment_one
    target: robot
    command_type: walk_velocity
    duration_sec: 5.0
    linear_x: 0.18
    linear_y: 0.0
    yaw_rate: 0.0
    max_speed: 0.5

  - name: slow_walk_segment_two
    target: robot
    command_type: walk_velocity
    duration_sec: 5.0
    linear_x: 0.18
    linear_y: 0.0
    yaw_rate: 0.0
    max_speed: 0.5

  - name: stop
    target: robot
    command_type: stop
    duration_sec: 1.0

  - name: sit
    target: robot
    command_type: sit
    duration_sec: 1.0
